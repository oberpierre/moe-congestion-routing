name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.1
        with:
          enable-cache: true
          cache-suffix: lint
      - run: uv sync --locked
      - run: uv run pre-commit run --all-files

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.1
        with:
          enable-cache: true
          cache-suffix: test
      - run: uv sync --locked
      - run: uv run pytest
