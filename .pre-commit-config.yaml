repos:
  - repo: meta
    hooks:
      - id: check-hooks-apply
      - id: check-useless-excludes

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        # .patch files carry significant whitespace (a blank context line is " "); stripping it
        # corrupts the diff so `git apply` fails. Never touch the vendored-submodule patches.
        exclude: ^patches/
      - id: end-of-file-fixer
        exclude: ^patches/
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        exclude: ^assets/tokenizer/gpt2/tokenizer.json$
      - id: check-merge-conflict
      - id: mixed-line-ending
      - id: name-tests-test
        # tests are co-located with source (src/**/foo_test.py), not under tests/,
        # so match any *test*.py file instead of the hook's tests/-only default
        files: (?i)(^|/)[^/]*test[^/]*\.py$
        args: [--pytest]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-check
      - id: ruff-format
