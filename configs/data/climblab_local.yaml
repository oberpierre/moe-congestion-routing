dataset_repo: nvidia/Nemotron-ClimbLab
output_dir: artifacts/climblab_local

# Two training clusters, each capped to a few shards; last shard of each held out as
# in-distribution validation. One entire cluster reserved as a held-out (domain-shift) set.
clusters:
  - cluster_1
  - cluster_2
held_out_clusters:
  - cluster_3

shards_per_cluster: 5
val_shards_per_cluster: 1

# Token/format details. ClimbLab is pre-tokenized GPT-2 ids; uint16 holds the vocab (50257).
token_column: tokens
dtype: uint16
append_eod: false
eod_token_id: 50256
vocab_size: 50257

# Threaded into the downstream GPTDataset deterministic global shuffle.
seed: 1234
seq_length: 2048
